name: Switch Manager Studio
description: Standalone editor for Home Assistant Switch Manager button configurations
version: "2.0.8"
slug: switch_manager_studio
url: https://github.com/sheepster-9k/Switch-Studio
image: ghcr.io/sheepster-9k/switch-studio
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
startup: application
boot: auto
hassio_api: true
homeassistant_api: true
map:
  - config:rw
  - share:ro
ports:
  8878/tcp: 8878
ports_description:
  8878/tcp: Switch Manager Studio web UI
options:
  ha_token: ""
  port: 8878
schema:
  ha_token: str?
  port: int
panel_icon: mdi:light-switch
panel_title: Switch Manager Studio
ingress: true
ingress_port: 8878
