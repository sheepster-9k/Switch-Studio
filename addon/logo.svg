<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <linearGradient id="lbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1040"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="lswitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ee9aff"/>
      <stop offset="100%" stop-color="#d46eff"/>
    </linearGradient>
    <linearGradient id="lglow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#d46eff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d46eff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="200" rx="24" fill="url(#lbg)"/>

  <!-- Icon section -->
  <g transform="translate(30, 36)">
    <!-- Glow -->
    <ellipse cx="64" cy="52" rx="30" ry="24" fill="url(#lglow)"/>
    <!-- Switch plate -->
    <rect x="38" y="24" width="52" height="80" rx="10" fill="#22133a" stroke="#d46eff" stroke-width="2.5" stroke-opacity="0.5"/>
    <!-- Toggle rocker -->
    <rect x="47" y="32" width="34" height="38" rx="6" fill="url(#lswitch)"/>
    <!-- Toggle indicator -->
    <circle cx="64" cy="48" r="3.5" fill="#fff" opacity="0.9"/>
    <!-- Lower rocker -->
    <rect x="47" y="74" width="34" height="22" rx="6" fill="#1a0a2e" opacity="0.6"/>
  </g>

  <!-- Text -->
  <text x="170" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#f0e6ff" letter-spacing="-0.5">Switch Manager</text>
  <text x="170" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="400" fill="#d46eff" letter-spacing="0.5">Studio</text>
</svg>
