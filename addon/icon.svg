<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1040"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="switch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ee9aff"/>
      <stop offset="100%" stop-color="#d46eff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#d46eff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d46eff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Glow behind switch -->
  <ellipse cx="64" cy="52" rx="30" ry="24" fill="url(#glow)"/>
  <!-- Switch plate -->
  <rect x="38" y="24" width="52" height="80" rx="10" fill="#22133a" stroke="#d46eff" stroke-width="2.5" stroke-opacity="0.5"/>
  <!-- Toggle rocker - up position (on) -->
  <rect x="47" y="32" width="34" height="38" rx="6" fill="url(#switch)"/>
  <!-- Toggle indicator dot -->
  <circle cx="64" cy="48" r="3.5" fill="#fff" opacity="0.9"/>
  <!-- Lower rocker shadow -->
  <rect x="47" y="74" width="34" height="22" rx="6" fill="#1a0a2e" opacity="0.6"/>
  <!-- Small label lines on plate -->
  <rect x="54" y="36" width="4" height="1.5" rx="0.75" fill="#fff" opacity="0.3"/>
  <rect x="54" y="40" width="8" height="1.5" rx="0.75" fill="#fff" opacity="0.2"/>
</svg>
